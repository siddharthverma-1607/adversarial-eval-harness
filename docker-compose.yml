version: "3.9"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: adversarial
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/adversarial
      MODEL_TYPE: mock
      MODEL_NAME: gpt-4.1
      MODEL_VERSION: latest
    ports:
      - "8000:8000"
    command: ["uvicorn", "harness.api:app", "--host", "0.0.0.0", "--port", "8000"]

  worker:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/adversarial
      MODEL_TYPE: mock
      MODEL_NAME: gpt-4.1
      MODEL_VERSION: latest
      WORKER_POLL_INTERVAL: "5"
    command: ["python", "-m", "harness.worker"]

volumes:
  db_data:
